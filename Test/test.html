<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Box</title>
  <style>
    body {
  margin: 0;
}

.container {
  display: flex;
}

.main-content {
  flex-grow: 1;
  padding: 20px;
  height: 100vh;
  background-color: aqua;
}

.sticky-box {
  position: -webkit-sticky;
  position: sticky;
  top: 20%; /* Hiển thị phần tử fixed khi cuộn đạt 20% */
  background-color: #f1f1f1;
  padding: 20px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

  </style>
</head>
<body>
  <div class="container">
    <div class="main-content">
      Nội dung chính của trang web
      
      <!-- ... -->
    </div>

    <div class="sticky-box">
      Nội dung của phần tử fixed
      Sticky Box Content
    </div>
  </div>
</body>
</html>
