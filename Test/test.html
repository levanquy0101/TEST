<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .image-container {
      position: relative;
      /* display: inline-block; */
    }

    .image-text {
      position: absolute;
      bottom: 10px; /* Điều chỉnh vị trí theo ý muốn */
      left: 10px; /* Điều chỉnh vị trí theo ý muốn */
      color: white; /* Màu chữ */
      font-size: 18px; /* Kích thước chữ */
      font-weight: bold; /* Độ đậm chữ */
      background: rgba(0, 0, 0, 0.5); /* Màu nền của chữ */
      padding: 10px; /* Khoảng cách từ viền */
    }
  </style>
  <title>Text on Image</title>
</head>
<body>

<div class="image-container">
  <img src="img1.jpg" alt="Mô tả hình ảnh">
  <p class="image-text">Chữ trên hình ảnh</p>
</div>

</body>
</html>
