<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

    input:checked ~ .menu {
      visibility: hidden;
    }
    .menu{
      position: fixed;
      top: 5%;
    }
    input{
      border: none;
    }
  </style>
</head>
<body>
  <input type="checkbox" name="a" id="">
  <h1 style="background-color: aqua;">Tôi tên là </h1>
  <div class="menu">
    <h1 style="background-color: azure;opacity: 0.5;">Xin chào các bạn</h1>
  </div>
</body>
</html>
