<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot ChatGPT</title>
</head>
<style>
</style>
<body>
 <div class="chatbot">
  <h1>Chatbot ChatGPT</h1>
  <input type="text" id="input-text" placeholder="Nhập câu hỏi của bạn">
  <button id="submit-button" onclick="reset()">Gửi</button>
  <div id="response-text"></div>
</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  
  <script>
    let input = document.getElementById("input-text").value;
    // Khóa API ChatGPT 
    const API_KEY = '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';
    
    // Hàm gọi API ChatGPT
    async function callChatGPT(inputText) {
    
      // Cấu hình request
      const requestOptions = {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          prompt: inputText,
          temperature: 0.5,
          max_tokens: 100
        })
      };
      
      // Gọi API
      const response = await fetch("https://api.openai.com/v1/engines/text-davinci-003/completions", requestOptions);
      
      // Lấy kết quả
      const responseJson = await response.json();
      const botResponse = responseJson.choices[0].text;
      
      // Trả về kết quả
      return botResponse;
      
    }
   
    // Xử lý sự kiện click nút Gửi
    $("#submit-button").click(async function() {
      
      // Lấy text đầu vào 
      const inputText = $("#input-text").val();
      
      // Gọi API ChatGPT
      const botResponse = await callChatGPT(inputText);

      document.getElementById("input-text").value='';
      
      // Hiển thị kết quả
      $("#response-text").text(botResponse);
    
    })
    
  </script>

</body>
</html>
